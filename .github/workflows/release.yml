name: Release (Linux)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux-2204:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev libreoffice-dev zip

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-fvisibility=hidden" \
            -DCMAKE_SHARED_LINKER_FLAGS="-Wl,-rpath,\$ORIGIN" \
            -Wno-dev
          cmake --build build --parallel $(nproc)

      - name: Collect Qt6 runtime libs
        run: |
          mkdir -p pkg
          cp build/libreai.so pkg/
          ldd build/libreai.so | grep -i 'Qt6' | awk '{print $3}' | xargs -I{} cp {} pkg/
          ls -lh pkg/

      - name: Package OXT
        run: |
          mkdir -p oxt
          cp -r META-INF description.xml description-en.txt Addons.xcu Jobs.xcu icons oxt/
          cp -r pkg/. oxt/
          cd oxt && zip -r ../libreai_ubuntu2204_x86_64.oxt .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-2204
          path: libreai_ubuntu2204_x86_64.oxt

  build-linux-2404:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev libreoffice-dev zip

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-fvisibility=hidden" \
            -DCMAKE_SHARED_LINKER_FLAGS="-Wl,-rpath,\$ORIGIN" \
            -Wno-dev
          cmake --build build --parallel $(nproc)

      - name: Collect Qt6 runtime libs
        run: |
          mkdir -p pkg
          cp build/libreai.so pkg/
          ldd build/libreai.so | grep -i 'Qt6' | awk '{print $3}' | xargs -I{} cp {} pkg/
          ls -lh pkg/

      - name: Package OXT
        run: |
          mkdir -p oxt
          cp -r META-INF description.xml description-en.txt Addons.xcu Jobs.xcu icons oxt/
          cp -r pkg/. oxt/
          cd oxt && zip -r ../libreai_ubuntu2404_x86_64.oxt .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-2404
          path: libreai_ubuntu2404_x86_64.oxt

  release:
    needs: [build-linux-2204, build-linux-2404]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build Debian package (22.04)
        run: |
          sudo apt-get install -y dpkg-dev
          cp artifacts/linux-2204/libreai_ubuntu2204_x86_64.oxt libreai.oxt
          bash package_deb.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "LibreAI ${{ github.ref_name }}"
          body: |
            ## LibreAI ${{ github.ref_name }}

            AI writing assistant for LibreOffice Writer — supports Ollama, OpenAI, and Anthropic Claude.

            ### Linux Downloads

            | File | Ubuntu version | LibreOffice | Install |
            |------|---------------|-------------|---------|
            | `libreai_ubuntu2204_x86_64.oxt` | 22.04 LTS | 7.x | `unopkg add libreai_ubuntu2204_x86_64.oxt` |
            | `libreai_ubuntu2404_x86_64.oxt` | 24.04 LTS | 24.x+ | `unopkg add libreai_ubuntu2404_x86_64.oxt` |
            | `libreai_*.deb` | 22.04 LTS | 7.x | `sudo dpkg -i libreai_*.deb` |

            ### Windows
            Run the **Release (Windows)** workflow manually from Actions to build and attach the Windows OXT.

            ### Requirements
            - Qt 6 runtime bundled in OXT
            - Ollama, OpenAI key, or Anthropic key for AI providers
          files: |
            artifacts/linux-2204/libreai_ubuntu2204_x86_64.oxt
            artifacts/linux-2404/libreai_ubuntu2404_x86_64.oxt
            libreai_*.deb
