name: Release (macOS)

on:
  # Build the macOS asset automatically on every version tag so releases
  # always include it (previously this was manual-only and macOS assets were
  # often missing or stale). Still dispatchable by hand for re-runs.
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach macOS OXT to (e.g. v1.0.7)'
        required: true

jobs:
  build-macos:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.*'
          arch: clang_64
          modules: ''

      - name: Install LibreOffice
        run: brew install --cask libreoffice

      - name: Download LibreOffice SDK
        run: |
          LO_APP=$(ls -d /Applications/LibreOffice*.app 2>/dev/null | head -1)
          LO_VER_FULL=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" \
            "${LO_APP}/Contents/Info.plist" 2>/dev/null || echo "26.2.2")
          LO_VER=$(echo "$LO_VER_FULL" | cut -d. -f1-3)
          echo "LO version: $LO_VER"
          MIRROR="https://www.nic.funet.fi/pub/mirrors/documentfoundation.org/libreoffice/stable"
          curl -fL --retry 5 --retry-delay 10 \
            "${MIRROR}/${LO_VER}/mac/aarch64/LibreOffice_${LO_VER}_MacOS_aarch64_sdk.dmg" \
            -o lo_sdk.dmg
          hdiutil attach lo_sdk.dmg -mountpoint /Volumes/LOSDK -nobrowse
          SDK_DIR=$(find /Volumes/LOSDK -maxdepth 1 -type d -name "LibreOffice*SDK*" | head -1)
          cp -r "$SDK_DIR" "$HOME/lo_sdk"
          hdiutil detach /Volumes/LOSDK -quiet
          # Locate real include root via sal/config.h
          SAL_H=$(find "$HOME/lo_sdk" -name "config.h" -path "*/sal/*" | head -1)
          LO_INC=$(dirname "$(dirname "$SAL_H")")
          echo "LO_INCLUDE=${LO_INC}" >> $GITHUB_ENV
          echo "LO_INCLUDE: ${LO_INC}"
          # UNO libs live in Frameworks/ as versioned dylibs — create unversioned symlinks
          UNO_FW="${LO_APP}/Contents/Frameworks"
          mkdir -p "$HOME/uno_stubs"
          for lib in cppu cppuhelpergcc3 sal; do
            src=$(ls "${UNO_FW}/libuno_${lib}.dylib"* 2>/dev/null | head -1)
            [ -n "$src" ] && ln -sf "$src" "$HOME/uno_stubs/libuno_${lib}.dylib" \
              && echo "stub: libuno_${lib}.dylib -> $src"
          done
          echo "LO_SDK_LIB=$HOME/uno_stubs" >> $GITHUB_ENV

      - name: Build
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLO_INCLUDE="${LO_INCLUDE}" \
            -DLO_SDK_LIB="${LO_SDK_LIB}" \
            -Wno-dev
          cmake --build build --parallel $(sysctl -n hw.logicalcpu)
          echo "=== deps of build/libreai.dylib ==="
          otool -L build/libreai.dylib

      - name: Bundle Qt6 frameworks into pkg/
        run: |
          mkdir -p pkg
          cp build/libreai.dylib pkg/

          # Qt6 from jurplel installs as frameworks; otool shows refs as
          # @rpath/QtCore.framework/Versions/A/QtCore. We need to:
          #   1. Find the actual file under $Qt6_DIR/lib/
          #   2. Copy just the inner dylib (not the whole framework) to pkg/
          #   3. Rewrite the reference in the binary
          # LO UNO refs use @__URELIB — leave them untouched (LO provides them).

          QT_LIB="${Qt6_DIR}/lib"

          copy_qt_dep() {
            local target="$1"
            # Process each dep that is an @rpath Qt framework reference
            otool -L "$target" | tail -n +2 | awk '{print $1}' | while read -r dep; do
              case "$dep" in
                @rpath/*.framework/*) ;;  # Qt framework — handle below
                *) continue ;;
              esac
              # e.g. @rpath/QtCore.framework/Versions/A/QtCore
              rel="${dep#@rpath/}"                     # QtCore.framework/Versions/A/QtCore
              fw=$(echo "$rel" | cut -d/ -f1)          # QtCore.framework
              inner=$(echo "$rel" | cut -d/ -f4)       # QtCore
              src="${QT_LIB}/${fw}/Versions/A/${inner}"
              [ -f "$src" ] || continue
              dest="pkg/${inner}"
              install_name_tool -change "$dep" "@loader_path/${inner}" "$target"
              if [ ! -f "$dest" ]; then
                cp "$src" "$dest"
                chmod u+w "$dest"
                install_name_tool -id "@loader_path/${inner}" "$dest"
                echo "bundled: ${inner}"
                copy_qt_dep "$dest"
              fi
            done
          }

          copy_qt_dep pkg/libreai.dylib

          # The UNO libs are linked with a never-patched placeholder install
          # name (@__…URELIB/libuno_*.dylib.3) that does not resolve at runtime,
          # so LibreOffice fails to load libreai.dylib on macOS ("loading
          # component library failed"). Rewrite them to @executable_path/../
          # Frameworks — the same scheme LibreOffice's own binaries use.
          URELIB='@__________________________________________________URELIB'
          for lib in cppu cppuhelpergcc3 sal; do
            install_name_tool -change \
              "${URELIB}/libuno_${lib}.dylib.3" \
              "@executable_path/../Frameworks/libuno_${lib}.dylib.3" \
              pkg/libreai.dylib || true
          done

          # Bundle the Qt platform plugin so Qt can create native windows.
          # Without platforms/libqcocoa.dylib, every show() call silently does
          # nothing on macOS — menus work but no window ever appears.
          QT_PLUGINS="${Qt6_DIR}/plugins"
          mkdir -p pkg/platforms
          cp "${QT_PLUGINS}/platforms/libqcocoa.dylib" pkg/platforms/

          # Rewrite any @rpath Qt deps inside libqcocoa.dylib itself
          copy_qt_dep pkg/platforms/libqcocoa.dylib

          # Also bundle the minimal platform support libs Qt expects alongside cocoa
          for plugin in libqmacstyle.dylib; do
            src="${QT_PLUGINS}/styles/${plugin}"
            [ -f "$src" ] && cp "$src" pkg/platforms/ && copy_qt_dep "pkg/platforms/${plugin}" || true
          done

          echo "=== pkg/ contents ==="
          ls -lh pkg/
          ls -lh pkg/platforms/
          echo "=== final otool -L pkg/libreai.dylib ==="
          otool -L pkg/libreai.dylib
          echo "=== otool -L pkg/platforms/libqcocoa.dylib ==="
          otool -L pkg/platforms/libqcocoa.dylib

      - name: Re-sign bundled binaries
        run: |
          # install_name_tool above rewrote load commands in every bundled
          # Qt binary (and libreai.dylib itself). That invalidates their
          # original code signature — each QtXxx binary was copied out of
          # its .framework and is no longer sealed against that framework's
          # Info.plist. On Apple Silicon, dyld/AMFI refuse to map any image
          # with an invalid signature (even ad-hoc, even with library
          # validation disabled), so LibreOffice gets silently SIGKILLed the
          # moment it dlopen()s the extension — indistinguishable from
          # "menu items do nothing" with zero console output. Re-sign
          # everything ad-hoc so each binary is self-consistent again.
          for f in pkg/libreai.dylib pkg/Qt* pkg/platforms/*.dylib; do
            [ -f "$f" ] || continue
            codesign --force --sign - "$f"
          done
          echo "=== verify signatures ==="
          for f in pkg/libreai.dylib pkg/Qt* pkg/platforms/*.dylib; do
            [ -f "$f" ] || continue
            codesign --verify --strict "$f"
          done

      - name: Package OXT
        run: |
          mkdir -p oxt
          cp -r META-INF description.xml description-en.txt Addons.xcu Jobs.xcu icons oxt/
          cp -r pkg/. oxt/
          # Write a qt.conf so Qt resolves the platform plugin path relative to
          # the loaded libreai.dylib — this is the most reliable cross-machine approach.
          printf '[Paths]\nPlugins = .\n' > oxt/qt.conf
          (cd oxt && zip -r ../libreai_macos_arm64.oxt .)
          echo "=== OXT contents ==="
          unzip -l libreai_macos_arm64.oxt

      - name: Validate OXT bundle
        run: |
          pip3 install --quiet pytest
          pytest tests/integration/test_oxt_bundle.py \
            --oxt=libreai_macos_arm64.oxt \
            -v --tb=short

      - name: Upload to GitHub Release
        # softprops creates the release if it does not exist yet, or appends
        # the macOS asset if the Linux job already created it — so this is
        # race-free regardless of which platform's job finishes first.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: libreai_macos_arm64.oxt
