name: Release (macOS)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach macOS OXT to (e.g. v1.0.7)'
        required: true

jobs:
  build-macos:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 and tools
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.*'
          arch: clang_64
          modules: ''

      - name: Install build tools and LibreOffice
        run: |
          brew install dylibbundler
          brew install --cask libreoffice

      - name: Download and install LibreOffice SDK
        run: |
          # Match the version brew installed so headers align with stub libs
          LO_APP=$(ls -d /Applications/LibreOffice*.app 2>/dev/null | head -1)
          echo "LO app: $LO_APP"
          # Read version from the app bundle
          LO_VER=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" \
            "${LO_APP}/Contents/Info.plist" 2>/dev/null || echo "24.8.6")
          echo "Detected LO version: $LO_VER"
          SDK_URL="https://download.documentfoundation.org/libreoffice/stable/${LO_VER}/mac/aarch64/LibreOffice_${LO_VER}_MacOS_aarch64_sdk.dmg"
          echo "Downloading: $SDK_URL"
          curl -fL "$SDK_URL" -o lo_sdk.dmg
          hdiutil attach lo_sdk.dmg -mountpoint /Volumes/LOSDK -nobrowse
          echo "=== DMG contents ==="
          find /Volumes/LOSDK -maxdepth 3
          # Find any installer package (pkg or mpkg)
          PKG=$(find /Volumes/LOSDK \( -name "*.pkg" -o -name "*.mpkg" \) | head -1)
          echo "Installing: $PKG"
          sudo installer -pkg "$PKG" -target /
          hdiutil detach /Volumes/LOSDK -quiet

      - name: Locate LO SDK paths
        run: |
          # SDK installs to /Library/Application Support/ or /opt
          LO_INC=$(find /Library/Application\ Support /opt /usr/local \
            -path "*/sdk/include/cppuhelper" -type d 2>/dev/null \
            | head -1 | xargs dirname 2>/dev/null)
          # Fall back to the app bundle's own headers if SDK installed there
          if [ -z "$LO_INC" ]; then
            LO_APP=$(ls -d /Applications/LibreOffice*.app 2>/dev/null | head -1)
            LO_INC=$(find "$LO_APP" -path "*/sdk/include" -type d 2>/dev/null | head -1)
          fi
          LO_LIB=$(find /Library/Application\ Support /opt /usr/local \
            -name "libuno_cppu*" 2>/dev/null | head -1 | xargs dirname 2>/dev/null)
          if [ -z "$LO_LIB" ]; then
            LO_APP=$(ls -d /Applications/LibreOffice*.app 2>/dev/null | head -1)
            LO_LIB=$(find "$LO_APP" -name "libuno_cppu*" 2>/dev/null | head -1 | xargs dirname 2>/dev/null)
          fi
          echo "LO_INCLUDE=${LO_INC}" >> $GITHUB_ENV
          echo "LO_SDK_LIB=${LO_LIB}" >> $GITHUB_ENV
          echo "LO_INCLUDE=${LO_INC}"
          echo "LO_SDK_LIB=${LO_LIB}"

      - name: Build
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLO_INCLUDE="${LO_INCLUDE}" \
            -DLO_SDK_LIB="${LO_SDK_LIB}" \
            -Wno-dev
          cmake --build build --parallel $(sysctl -n hw.logicalcpu)
          echo "=== otool -L build/libreai.dylib ==="
          otool -L build/libreai.dylib

      - name: Bundle all dependencies with dylibbundler
        run: |
          mkdir -p pkg
          cp build/libreai.dylib pkg/
          # Recursively collect and relink all non-system dylibs.
          # @loader_path means "same directory as the loading dylib" — correct
          # for a flat OXT where all libs sit alongside libreai.dylib.
          dylibbundler \
            --fix-file pkg/libreai.dylib \
            --bundle-deps \
            --dest-dir pkg \
            --install-path @loader_path/ \
            --overwrite-dir
          echo "=== Bundled libs ==="
          ls -lh pkg/
          echo "=== Final link map ==="
          otool -L pkg/libreai.dylib

      - name: Package OXT
        run: |
          mkdir -p oxt
          cp -r META-INF description.xml description-en.txt Addons.xcu Jobs.xcu icons oxt/
          cp -r pkg/. oxt/
          cd oxt && zip -r ../libreai_macos_arm64.oxt .
          echo "=== OXT contents ==="
          unzip -l libreai_macos_arm64.oxt

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.inputs.tag }}" \
            libreai_macos_arm64.oxt --clobber
