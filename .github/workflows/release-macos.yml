name: Release (macOS)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach macOS OXT to (e.g. v1.0.7)'
        required: true

jobs:
  build-macos:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 and tools
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.*'
          arch: clang_64
          modules: ''

      - name: Install build tools and LibreOffice
        run: |
          brew install dylibbundler
          brew install --cask libreoffice

      - name: Download LibreOffice SDK and locate paths
        run: |
          LO_APP=$(ls -d /Applications/LibreOffice*.app 2>/dev/null | head -1)
          echo "LO app: $LO_APP"
          # CFBundleShortVersionString can be 4-part (26.2.2.2); URLs use 3-part
          LO_VER_FULL=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" \
            "${LO_APP}/Contents/Info.plist" 2>/dev/null || echo "26.2.2")
          LO_VER=$(echo "$LO_VER_FULL" | cut -d. -f1-3)
          echo "Detected LO version: $LO_VER"
          # Use funet mirror — more reliable than the primary LO download server
          MIRROR="https://www.nic.funet.fi/pub/mirrors/documentfoundation.org/libreoffice/stable"
          SDK_URL="${MIRROR}/${LO_VER}/mac/aarch64/LibreOffice_${LO_VER}_MacOS_aarch64_sdk.dmg"
          echo "Downloading: $SDK_URL"
          curl -fL --retry 5 --retry-delay 10 "$SDK_URL" -o lo_sdk.dmg
          hdiutil attach lo_sdk.dmg -mountpoint /Volumes/LOSDK -nobrowse
          echo "=== DMG top-level ==="
          ls /Volumes/LOSDK/
          # The SDK DMG is a flat directory — no installer package.
          SDK_DIR=$(find /Volumes/LOSDK -maxdepth 1 -type d -name "LibreOffice*SDK*" | head -1)
          echo "SDK dir: $SDK_DIR"
          sudo cp -r "$SDK_DIR" /opt/lo_sdk
          hdiutil detach /Volumes/LOSDK -quiet
          echo "=== SDK directory tree (depth 2) ==="
          find /opt/lo_sdk -maxdepth 2 -type d
          # Find sal/config.h to determine the real include root
          SAL_H=$(find /opt/lo_sdk -name "config.h" -path "*/sal/*" | head -1)
          echo "sal/config.h found at: $SAL_H"
          if [ -n "$SAL_H" ]; then
            # include root is two levels up from sal/config.h
            LO_INC=$(dirname "$(dirname "$SAL_H")")
          else
            LO_INC=/opt/lo_sdk/include
          fi
          echo "LO_INCLUDE=${LO_INC}" >> $GITHUB_ENV
          echo "LO_INCLUDE=${LO_INC}"
          ls "${LO_INC}/" | head -10
          # Locate UNO dylibs — they may be in MacOS/ or Frameworks/
          echo "=== Searching for libuno_cppu in LO bundle ==="
          find "${LO_APP}" -name "libuno_cppu*" 2>/dev/null
          find "${LO_APP}" -name "libuno_sal*" 2>/dev/null
          find "${LO_APP}" -name "libuno_cppuhelper*" 2>/dev/null
          UNO_DIR=$(find "${LO_APP}" -name "libuno_cppu.dylib" 2>/dev/null \
            | head -1 | xargs dirname 2>/dev/null)
          echo "LO_SDK_LIB=${UNO_DIR}" >> $GITHUB_ENV
          echo "LO_SDK_LIB=${UNO_DIR}"

      - name: Build
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLO_INCLUDE="${LO_INCLUDE}" \
            -DLO_SDK_LIB="${LO_SDK_LIB}" \
            -Wno-dev
          cmake --build build --parallel $(sysctl -n hw.logicalcpu)
          echo "=== otool -L build/libreai.dylib ==="
          otool -L build/libreai.dylib

      - name: Bundle all dependencies with dylibbundler
        run: |
          mkdir -p pkg
          cp build/libreai.dylib pkg/
          # Recursively collect and relink all non-system dylibs.
          # @loader_path resolves relative to the loading dylib — correct for a
          # flat OXT where all libs sit alongside libreai.dylib.
          # Exclude LO's own UNO libs: they are provided by the host LO install.
          dylibbundler \
            --fix-file pkg/libreai.dylib \
            --bundle-deps \
            --dest-dir pkg \
            --install-path @loader_path/ \
            --overwrite-dir \
            --ignore /Applications/LibreOffice.app
          echo "=== Bundled libs ==="
          ls -lh pkg/
          echo "=== Final link map ==="
          otool -L pkg/libreai.dylib

      - name: Package OXT
        run: |
          mkdir -p oxt
          cp -r META-INF description.xml description-en.txt Addons.xcu Jobs.xcu icons oxt/
          cp -r pkg/. oxt/
          cd oxt && zip -r ../libreai_macos_arm64.oxt .
          echo "=== OXT contents ==="
          unzip -l libreai_macos_arm64.oxt

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.inputs.tag }}" \
            libreai_macos_arm64.oxt --clobber
